<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Profile</title>

<style>
body{
margin:0;
padding:20px;
background:#0b0f19;
color:white;
font-family:sans-serif;
}

.avatar-box{
text-align:center;
margin-bottom:20px;
}

#avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #ef4444;
}

.camera-btn{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
box-sizing:border-box;
}

button.save{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
font-size:16px;
}
</style>
</head>
<body>

<h2>Edit Profile</h2>

<div class="avatar-box">

<img
id="avatar"
src="/public/images/default-avatar.png">

<br>

<input
type="file"
id="avatarInput"
accept="image/*"
hidden>

<button
class="camera-btn"
onclick="document.getElementById('avatarInput').click()">
📷 Ganti Foto
</button>

</div>

<input
type="text"
id="username"
placeholder="Username">

<textarea
id="bio"
placeholder="Bio"></textarea>

<input
type="text"
id="city"
placeholder="Kota">

<button
class="save"
onclick="saveProfile()">
Simpan
</button>

<script>

async function loadProfile(){

const res =
await fetch("/api/profile");

const data =
await res.json();

if(!data.user) return;

document.getElementById("username").value =
data.user.username || "";

document.getElementById("bio").value =
data.user.bio || "";

document.getElementById("city").value =
data.user.city || "";

document.getElementById("avatar").src =
data.user.avatar ||
"/public/images/default-avatar.png";

}

document
.getElementById("avatarInput")
.addEventListener(
"change",
async function(){

  const file = this.files[0];
  if(!file) return;

  const formData = new FormData();
  formData.append("avatar", file);

  try{

    const res = await fetch(
      "/api/profile/avatar",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await res.json();

    console.log(data);

    alert(
      JSON.stringify(data)
    );

  }catch(err){

    console.log(err);
    alert(err);

  }

});

async function saveProfile(){

const res =
await fetch(
"/api/profile",
{
method:"PUT",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
username:
document.getElementById("username").value,
bio:
document.getElementById("bio").value,
city:
document.getElementById("city").value
})
}
);

const data =
await res.json();

if(data.success){

alert(
"Profil berhasil disimpan"
);

location.href =
"/profile";

}

}

loadProfile();

</script>

</body>
</html>
