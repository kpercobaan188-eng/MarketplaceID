<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0b0f19;
      color: white;
    }

    .img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      background: #111827;
    }

    .container {
      padding-bottom: 100px;
    }

    .card {
      background: #111827;
      margin: 10px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      color: #ef4444;
      font-size: 16px;
      margin-top: 5px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }

    .desc {
      margin-top: 10px;
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.4;
    }

    /* SELLER */
    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .seller img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .seller-name {
      font-weight: bold;
      font-size: 14px;
    }

    /* BUTTON */
    .btn-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      padding: 10px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #1f2937;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .chat {
      background: #1f2937;
      color: white;
    }

    .buy {
      background: #ef4444;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <img id="img" class="img" src="/public/images/banner1.jpg">

  <!-- INFO -->
  <div class="card">
    <div id="title" class="title">Loading...</div>
    <div id="price" class="price">Rp 0</div>
    <div id="meta" class="meta">Lokasi</div>
    <div id="desc" class="desc">Loading deskripsi...</div>
  </div>

  <!-- SELLER -->
  <div class="card seller">
    <img id="sellerImg" src="/public/images/default-avatar.png">
    <div>
      <div id="seller" class="seller-name">Seller</div>
      <div class="meta">Online</div>
    </div>
  </div>

</div>

<!-- ACTION -->
<div class="btn-area">
  <button class="btn chat" onclick="chatSeller()">Chat</button>
  <button class="btn buy" onclick="buyNow()">COD / Nego</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadProduct() {
  const res = await fetch(`/api/products/${id}`);
  const data = await res.json();

  if (!data.success) return;

  const p = data.product;

  const img = (p.images && p.images.length > 0)
    ? p.images[0]
    : "/public/images/banner1.jpg";

  document.getElementById("img").src = img;
  document.getElementById("title").innerText = p.title;
  document.getElementById("price").innerText = "Rp " + Number(p.price).toLocaleString();
  document.getElementById("meta").innerText = p.location || "Indonesia";
  document.getElementById("desc").innerText = p.description || "Tidak ada deskripsi";

  // seller dummy (kalau belum join API seller)
  document.getElementById("seller").innerText = "Seller ID: " + p.sellerId;
}

function chatSeller() {
  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");

  window.location.href = `/chat?productId=${productId}`;
}

function buyNow() {
  alert("COD / Nego aktif (demo mode)");
}

loadProduct();
</script>

</body>
</html>
