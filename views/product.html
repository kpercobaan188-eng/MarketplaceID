<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .container {
      padding-bottom: 90px;
    }

    .img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 15px;
      margin-top: 10px;
      border: 1px solid #1f2937;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      color: #ef4444;
      font-size: 16px;
      margin-top: 5px;
    }

    .meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }

    .desc {
      margin-top: 10px;
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.4;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .seller img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .btn-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      padding: 10px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #1f2937;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .chat {
      background: #1f2937;
      color: white;
    }

    .buy {
      background: #ef4444;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <img id="img" class="img" src="/public/images/banner1.jpg">

  <!-- INFO -->
  <div class="card">
    <div id="title" class="title">Produk</div>
    <div id="price" class="price">Rp 0</div>
    <div id="meta" class="meta">Lokasi</div>

    <div id="desc" class="desc">
      Loading deskripsi...
    </div>
  </div>

  <!-- SELLER -->
  <div class="card seller">
    <img src="/public/images/default-avatar.png">
    <div>
      <div id="seller">Penjual</div>
      <div class="meta">Online</div>
    </div>
  </div>

</div>

<!-- ACTION BUTTON -->
<div class="btn-area">
  <button class="btn chat" onclick="chatSeller()">Chat</button>
  <button class="btn buy" onclick="buyNow()">COD / Nego</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadProduct() {
  const res = await fetch("/api/home");
  const data = await res.json();

  const product = (data.latest || []).find(p => p.id == id);

  if (!product) return;

  document.getElementById("title").innerText = product.title;
  document.getElementById("price").innerText = "Rp " + product.price;
  document.getElementById("meta").innerText = product.location || "Indonesia";
  document.getElementById("desc").innerText = product.description || "Tidak ada deskripsi";
  document.getElementById("img").src = product.image || "/public/images/banner1.jpg";
  document.getElementById("seller").innerText = product.sellerName || "Seller";
}

function chatSeller() {
  alert("Fitur chat akan diarahkan ke chat system");
  window.location.href = "/inbox";
}

function buyNow() {
  alert("Transaksi COD / Nego (offline meet)");
}

loadProduct();
</script>

</body>
</html>
