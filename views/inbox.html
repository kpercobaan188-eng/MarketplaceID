<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ef4444;
      font-weight: bold;
      border-bottom: 1px solid #1f2937;
      z-index: 1000;
    }

    .container {
      padding: 70px 15px 80px 15px;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

.chat-item{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:.2s;
}

.chat-item:hover{
  transform:translateY(-2px);
}

.chat-item img{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
}

.name{
  color:#fff;
  font-size:15px;
  font-weight:700;
}

.msg{
  color:#94a3b8;
  font-size:12px;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.time{
  color:#64748b;
  font-size:11px;
  margin-left:auto;
}

.badge{
  background:#ef4444;
  min-width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:11px;
  margin-left:8px;
}
  </style>
</head>

<body>

<div class="header">Chat / Inbox</div>

<div class="container">

  <div id="chats" class="chat-list"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/home">Beranda</a>
  <a href="/favorites">Favorit</a>
  <a href="/add-product">+</a>
  <a class="active" href="/inbox">Chat</a>
  <a href="/profile">Akun</a>
</div>

<script>
async function loadChats() {

  const res = await fetch("/api/inbox", {
    credentials: "include"
  });

  const data = await res.json();

  const container =
    document.getElementById("chats");

  container.innerHTML = "";

  if (!data.success) return;

  if (!data.inbox) return;

  data.inbox.forEach(item => {

    const user = item.user || {};

    const chat = item.chat || {};

    const div =
      document.createElement("div");

    div.className = "chat-item";

    const date =
      new Date(chat.createdAt || Date.now());

    const time =
      date.toLocaleTimeString("id-ID", {
        hour: "2-digit",
        minute: "2-digit"
      });

    div.innerHTML = `
      <img src="${
        user.avatar ||
        '/public/images/default-avatar.png'
      }">

      <div class="chat-info">

        <div class="name">
          ${user.username || user.name || 'User'}
        </div>

        <div class="msg">
          ${chat.message || 'Mulai percakapan'}
        </div>

      </div>

      <div class="time">
        ${time}
      </div>

      ${
        chat.read === false
        ? '<div class="badge">1</div>'
        : ''
      }
    `;

    div.onclick = () => {

window.location.href =
  "/chat?id=" +
  user.id +
  "&productId=" +
  (item.productId || 0);

    };

    container.appendChild(div);

  });

}

loadChats();

setInterval(loadChats,3000);
</script>

</body>
</html>
