<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketplaceID - Home</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0b0f19;
      color: white;
    }

    .container {
      padding: 70px 12px 90px;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      padding: 0 12px;
      z-index: 1000;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      color: #ef4444;
      font-weight: bold;
      font-size: 14px;
      margin-right: 10px;
    }

    .search input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 12px;
      outline: none;
    }

    /* BANNER */
    .banner {
      background: linear-gradient(135deg, #ef4444, #111827);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .banner h2 {
      font-size: 14px;
      margin: 0;
    }

    .banner p {
      font-size: 12px;
      color: #d1d5db;
      margin: 5px 0 10px;
    }

    .banner button {
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      background: white;
      font-size: 12px;
      font-weight: bold;
    }

    /* CATEGORY */
    .category{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.cat-item{
  min-width:max-content;
  padding:12px 18px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:15px;
  white-space:nowrap;
  cursor:pointer;
}

    /* GRID PRODUCTS */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* CARD */
    .product {
      background: #111827;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: 0.2s;
      border: 1px solid #1f2937;
    }

    .product:hover {
      transform: translateY(-3px);
    }

    .product img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #0f172a;
    }

    .product-body {
      padding: 10px;
    }

    .title {
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price {
      color: #ef4444;
      font-size: 13px;
      margin-top: 4px;
      font-weight: bold;
    }

    .meta {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 3px;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #1f2937;
    }

    .bottom-nav a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 11px;
    }

    .bottom-nav a.active {
      color: #ef4444;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">MID</div>
  <div class="search">
    <input type="text" placeholder="Cari produk, kategori...">
  </div>
</div>

<div class="container">

  <!-- BANNER -->
  <div class="banner">
    <h2>Temukan Barang Terbaik</h2>
    <p>Jual beli aman & terpercaya</p>
    <button>Belanja Sekarang</button>
  </div>

<!-- CATEGORY -->
<div class="category">

  <div class="cat-item" onclick="renderProducts(allProducts)">
    🔥 Semua
  </div>

  <div class="cat-item" onclick="filterCategory('📱 Smartphone')">
    📱 Smartphone
  </div>

  <div class="cat-item" onclick="filterCategory('💻 Komputer')">
    💻 Komputer
  </div>

  <div class="cat-item" onclick="filterCategory('🏍️ Motor')">
    🏍️ Motor
  </div>

  <div class="cat-item" onclick="filterCategory('🚗 Mobil')">
    🚗 Mobil
  </div>

  <div class="cat-item" onclick="filterCategory('🎮 Akun Game')">
    🎮 Akun Game
  </div>

  <div class="cat-item" onclick="filterCategory('🏠 Rumah Tangga')">
    🏠 Rumah Tangga
  </div>

  <div class="cat-item" onclick="filterCategory('⚽ Olahraga')">
    ⚽ Olahraga
  </div>

  <div class="cat-item" onclick="filterCategory('🐱 Hewan Peliharaan')">
    🐱 Hewan Peliharaan
  </div>

  <div class="cat-item" onclick="filterCategory('🌾 Tanah')">
    🌾 Tanah
  </div>

  <div class="cat-item" onclick="filterCategory('🏪 Toko')">
    🏪 Toko
  </div>

  <div class="cat-item" onclick="filterCategory('🏺 Barang Antik')">
    🏺 Barang Antik
  </div>

</div>

<!-- PRODUCTS -->
<div class="product-grid" id="products"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a class="active" href="/home">Beranda</a>
  <a href="/favorites">Favorit</a>
  <a href="/add-product">+</a>
  <a href="/inbox">Chat</a>
  <a href="/profile">Akun</a>
</div>

<script>

let allProducts = [];

async function loadProducts(){

  const res = await fetch("/api/products");
  const data = await res.json();

  allProducts = data.products || [];

  renderProducts(allProducts);
}

function renderProducts(products){

  const container =
    document.getElementById("products");

  container.innerHTML = "";

  products.forEach(product => {

    const img =
      product.images?.[0] ||
      "/public/images/banner1.jpg";

    container.innerHTML += `
      <div class="product-card"
           onclick="openProduct('${product.id}')">

        <img src="${img}">
        <h3>${product.title}</h3>
        <p>Rp ${Number(product.price).toLocaleString()}</p>

      </div>
    `;
  });
}

function openProduct(id){
  window.location.href =
    "/product?id=" + id;
}

function filterCategory(category){

  const result =
    allProducts.filter(
      p => p.category === category
    );

  renderProducts(result);
}

loadProducts();

</script>

</body>
</html>
