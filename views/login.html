<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 350px;
      background: #111827;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #1f2937;
    }

    .title {
      text-align: center;
      color: #ef4444;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .text {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }

    .text a {
      color: #ef4444;
      text-decoration: none;
    }

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111827;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  color: white;
  width: 80%;
  max-width: 320px;
}

  </style>
</head>

<body>

  <div class="card">
    <div class="title">MarketplaceID</div>

    <input type="text" id="login" placeholder="Username atau Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="doLogin()">Masuk</button>

    <div class="text">
      Belum punya akun? <a href="/register">Daftar</a>
    </div>
  </div>

  <script>
    async function doLogin() {
      const login = document.getElementById("login").value;
      const password = document.getElementById("password").value;

      if (!login || !password) {
        alert("Isi semua field");
        return;
      }

      const res = await fetch("/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ login, password })
      });

      const data = await res.json();

    if (data.success) {

  document.getElementById("successPopup")
    .style.display = "flex";

  document.getElementById("successText")
    .innerText = "Login berhasil";

  setTimeout(() => {
    window.location.href = "/home";
  }, 1200);

} else {

  document.getElementById("errorPopup")
    .style.display = "flex";

  document.getElementById("errorText")
    .innerText = data.message || "Login gagal";
}
    }
  <script>

  <div id="successPopup" class="popup">
    <div class="popup-box">
      <h2>🎉 Sukses</h2>
      <p id="successText"></p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <!-- ERROR POPUP -->
 <div id="errorPopup" class="popup">

   <div class="popup-box">

     <h2>❌ Gagal</h2>

     <p id="errorText"></p>

     <button onclick="closePopup()">
       Tutup
     </button>

   </div>

</div>

</script>

function closePopup(){
  document.getElementById("errorPopup").style.display="none";
  document.getElementById("successPopup").style.display="none";
}

<script>

</body>
</html>
