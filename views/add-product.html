<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Produk - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .container {
      padding: 20px;
      padding-bottom: 90px;
    }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 15px;
      border: 1px solid #1f2937;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
      font-size: 13px;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #ef4444;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">Tambah Produk</div>
    <div class="hint">Jual barang seken atau baru dengan aman</div>

    <input type="text" id="title" placeholder="Judul produk">

    <input type="number" id="price" placeholder="Harga">

    <select id="category">
      <option value="">Pilih kategori</option>
      <option>Elektronik</option>
      <option>Fashion</option>
      <option>Motor</option>
      <option>Rumah</option>
      <option>Lainnya</option>
    </select>

    <textarea id="description" placeholder="Deskripsi produk"></textarea>

<input type="file" id="imageInput" multiple accept="image/*" hidden>

<div class="image-boxes">
  <div class="box" onclick="document.getElementById('imageInput').click()">+</div>
  <div class="box" onclick="document.getElementById('imageInput').click()">+</div>
  <div class="box" onclick="document.getElementById('imageInput').click()">+</div>
</div>

<div id="preview" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;"></div>

    <button onclick="addProduct()">Simpan Produk</button>

  </div>

</div>

<script>
let selectedFiles = [];

document.getElementById("imageInput").addEventListener("change", (e) => {
  selectedFiles = Array.from(e.target.files);

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  selectedFiles.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    img.style.width = "80px";
    img.style.height = "80px";
    img.style.objectFit = "cover";
    img.style.borderRadius = "10px";
    preview.appendChild(img);
  });
});

async function addProduct() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value;
  const images = document.getElementById("imageInput").files;

  if (!title || !price || !category) {
    alert("Isi data wajib");
    return;
  }

  const formData = new FormData();

  formData.append("title", title);
  formData.append("price", price);
  formData.append("category", category);
  formData.append("description", description);

  for (let i = 0; i < images.length; i++) {
    formData.append("images", images[i]);
  }

  const res = await fetch("/api/products", {
    method: "POST",
    credentials: "include", // 👈 TAMBAH DI SINI
    body: formData
});

  const data = await res.json();

  if (data.success) {
    alert("Produk berhasil ditambahkan");
    window.location.href = "/home";
  } else {
    alert(JSON.stringify(data));
  }
}

</script>

</body>
</html>
