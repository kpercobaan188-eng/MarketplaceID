<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 350px;
      background: #111827;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #1f2937;
    }

    .title {
      text-align: center;
      color: #ef4444;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .text {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }

    .text a {
      color: #ef4444;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">Buat Akun</div>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="doRegister()">Daftar</button>

    <div class="text">
      Sudah punya akun? <a href="/login">Login</a>
    </div>
  </div>

  <script>
    async function doRegister() {
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!username || !email || !password) {
        alert("Isi semua field");
        return;
      }

      const res = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username,
          email,
          password
        })
      });

      const data = await res.json();

      if (data.success) {
        alert("Register berhasil");
        window.location.href = "/login";
      } else {
        alert(data.message || "Register gagal");
      }
    }
  </script>

</body>
</html>
