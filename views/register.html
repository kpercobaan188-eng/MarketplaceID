<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 350px;
      background: #111827;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #1f2937;
    }

    .title {
      text-align: center;
      color: #ef4444;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .text {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }

    .text a {
      color: #ef4444;
      text-decoration: none;
    }

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:none;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,.7);

  z-index:9999;
}

.popup-box{

  width:90%;
  max-width:350px;

  padding:25px;

  border-radius:20px;

  text-align:center;

  color:white;

  background:#111827;

  border:1px solid #ef4444;

  box-shadow:
  0 0 25px rgba(239,68,68,.3);
}

.popup-box h2{
  color:#ef4444;
  margin-bottom:10px;
}

./popup-box p{
  color:#d1d5db;
  margin-bottom:20px;
}

  </style>
</head>

<body>

  <div class="card">
    <div class="title">Buat Akun</div>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="doRegister()">Daftar</button>

    <div class="text">
      Sudah punya akun? <a href="/login">Login</a>
    </div>
  </div>

  <script>
    async function doRegister() {
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!username || !email || !password) {

  document.getElementById("errorPopup")
    .style.display = "flex";

  document.getElementById("errorText")
    .innerText = "Isi semua field";

  return;
}

      const res = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username,
          email,
          password
        })
      });

      const data = await res.json();

    if (data.success) {

  document.getElementById("successPopup")
    .style.display = "flex";

} else {

  document.getElementById("errorPopup")
    .style.display = "flex";

  document.getElementById("errorText")
    .innerText =
    data.message || "Register gagal";
}
    }
  </script>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="popup">

  <div class="popup-box">

    <h2>🎉 Register Berhasil</h2>

    <p>
      Akun berhasil dibuat.
      Silahkan login untuk melanjutkan.
    </p>

    <button onclick="goLogin()">
      Login Sekarang
    </button>

  </div>

</div>

<!-- ERROR POPUP -->
<div id="errorPopup" class="popup">

  <div class="popup-box">

    <h2>❌ Gagal</h2>

    <p id="errorText"></p>

    <button onclick="closePopup()">
      Tutup
    </button>

  </div>

</div>

<script>

function goLogin(){
  window.location.href="/login";
}

function closePopup(){
  document.getElementById("errorPopup")
    .style.display="none";
}

</script>

</body>
</html>
