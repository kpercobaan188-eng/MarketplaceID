<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #1f2937;
      z-index: 1000;
      color: #ef4444;
      font-weight: bold;
    }

    .container {
      padding: 70px 10px 80px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

.chat-box{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  display:flex;
  width:100%;
}

.msg.me{
  justify-content:flex-end;
}

.msg.other{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.4;
  word-break:break-word;
}

.msg.me .bubble{
  background:linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );
  color:white;
  border-bottom-right-radius:6px;
  box-shadow:0 8px 20px rgba(239,68,68,.25);
}

.msg.other .bubble{
  background:#1f2937;
  color:white;
  border-bottom-left-radius:6px;
  border:1px solid #374151;
}

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      padding: 10px;
      gap: 10px;
      border-top: 1px solid #1f2937;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    .input-area button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  Chat Room
</div>

<div class="container">
  <div id="chatBox" class="chat-box"></div>
</div>

<div class="input-area">
  <input type="text" id="message" placeholder="Tulis pesan...">
  <button onclick="sendMsg()">Kirim</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const userId = params.get("id");
const productId = params.get("productId");

let targetUserId = userId;
let currentUserId = null;

/* GET LOGIN USER */
async function getMe() {

  try {

    const res = await fetch("/api/me", {
      credentials: "include"
    });

    const data = await res.json();

    if(data.success){
      currentUserId = Number(data.user.id);
    }

    console.log("MY ID =", currentUserId);

  } catch(err){
    console.log(err);
  }

}

/* INIT CHAT */
async function initChat() {

  if (!productId) return;

  try {

    const res = await fetch(`/api/products/${productId}`);
    const data = await res.json();

    if (!data.success) return;

    targetUserId = data.product.sellerId;

    document.querySelector(".header").innerText =
      data.product.title;

  } catch(err){
    console.log(err);
  }

}

/* LOAD CHAT */
async function loadChat() {

  try {

    const res = await fetch(
      "/api/chat/" + targetUserId,
      {
        credentials: "include"
      }
    );

    const data = await res.json();

    const box =
      document.getElementById("chatBox");

    box.innerHTML = "";

    if (!data.success) return;

    data.messages.forEach(m => {

console.log("CURRENT USER =", currentUserId);
console.log("FROM =", m.fromUserId);

      const div =
        document.createElement("div");

      const isMe =
        Number(m.fromUserId) ===
        Number(currentUserId);

      div.className =
        isMe ? "msg me" : "msg other";

      div.innerHTML = `
        <div class="bubble">
          ${m.message}
        </div>
      `;

      box.appendChild(div);

    });

    box.scrollTop =
      box.scrollHeight;

  } catch(err){
    console.log(err);
  }

}

/* SEND MESSAGE */
async function sendMsg() {

  const input =
    document.getElementById("message");

  const message =
    input.value.trim();

  if (!message) return;

  try {

    const res =
      await fetch("/api/chat/send", {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          toUserId:
            Number(targetUserId),
          productId:
            Number(productId) || null,
          message
        })
      });

    const data = await res.json();

console.log("SEND RESULT:", data);

if (!data.success) {
  alert(JSON.stringify(data));
  return;
}

    input.value = "";

    await loadChat();

  } catch(err) {

    console.log(err);
    alert("Server error");

  }

}

/* ENTER KEY */
document
.getElementById("message")
.addEventListener(
  "keypress",
  function(e){
    if(e.key === "Enter"){
      sendMsg();
    }
  }
);

/* START */
(async () => {

  await getMe();

  await initChat();

  await loadChat();

  setInterval(() => {
    loadChat();
  }, 3000);

})();
</script>

</body>
</html>
