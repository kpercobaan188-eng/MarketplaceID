<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #1f2937;
      z-index: 1000;
      color: #ef4444;
      font-weight: bold;
    }

    .container {
      padding: 70px 10px 80px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    .me {
      align-self: flex-end;
      background: #ef4444;
      color: white;
      border-bottom-right-radius: 0;
    }

    .other {
      align-self: flex-start;
      background: #1f2937;
      color: white;
      border-bottom-left-radius: 0;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      padding: 10px;
      gap: 10px;
      border-top: 1px solid #1f2937;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    .input-area button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  Chat Room
</div>

<div class="container">
  <div id="chatBox" class="chat-box"></div>
</div>

<div class="input-area">
  <input type="text" id="message" placeholder="Tulis pesan...">
  <button onclick="sendMsg()">Kirim</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

/* LOAD CHAT */
async function loadChat() {
  const res = await fetch("/api/chat/" + userId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  if (!data.messages) return;

  data.messages.forEach(m => {
    const div = document.createElement("div");

    div.className = "msg " + (m.fromUserId == userId ? "other" : "me");

    div.innerText = m.message;

    box.appendChild(div);
  });
}

/* SEND MESSAGE */
async function sendMsg() {
  const message = document.getElementById("message").value;

  if (!message) return;

  await fetch("/api/chat/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      toUserId: userId,
      message: message
    })
  });

  document.getElementById("message").value = "";

  loadChat();
}

loadChat();
</script>

</body>
</html>
