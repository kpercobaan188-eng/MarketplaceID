<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - MarketplaceID</title>

  <link rel="stylesheet" href="/public/css/style.css">

  <style>
    body {
      background: #0b0f19;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111827;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #1f2937;
      z-index: 1000;
      color: #ef4444;
      font-weight: bold;
    }

    .container{
  padding:12px 10px 80px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.chat-box{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  display:flex;
  width:100%;
}

.msg.me{
  justify-content:flex-end;
}

.msg.other{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.4;
  word-break:break-word;
}

.msg.me .bubble{
  background:linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );
  color:white;
  border-bottom-right-radius:6px;
  box-shadow:0 8px 20px rgba(239,68,68,.25);
}

.msg.other .bubble{
  background:#1f2937;
  color:white;
  border-bottom-left-radius:6px;
  border:1px solid #374151;
}

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111827;
      display: flex;
      padding: 10px;
      gap: 10px;
      border-top: 1px solid #1f2937;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    .input-area button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
 
#productCard{
  padding:70px 12px 0;
}

.product-chat-card{
  display:flex;
  gap:12px;
  align-items:center;

  background:#111827;
  border:1px solid #1f2937;

  border-radius:18px;

  padding:12px;

  box-shadow:
  0 10px 25px rgba(0,0,0,.35);
}

.product-chat-img{
  width:70px;
  height:70px;

  border-radius:12px;

  object-fit:cover;
}

.product-chat-info{
  flex:1;
}

.product-chat-title{
  color:white;
  font-size:14px;
  font-weight:700;
}

.product-chat-price{
  color:#ef4444;
  margin-top:6px;
  font-weight:700;
}
 </style>
</head>

<body>

<div class="header">
  Chat Room
</div>

<div id="productCard"></div>

<div class="container">
  <div id="chatBox" class="chat-box"></div>
</div>

<div class="input-area">
  <input type="text" id="message" placeholder="Tulis pesan...">
  <button onclick="sendMsg()">Kirim</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const userId = params.get("id");
const productId = params.get("productId");

let targetUserId = userId;
let currentUserId = null;

/* GET LOGIN USER */

async function getMe(){
  const res = await fetch("/api/me", {
    credentials:"include"
  });

  const data = await res.json();

  if(data.success){
    window.currentUserId = Number(data.user.id);
  }

  console.log("MY ID:", window.currentUserId);
}

/* INIT CHAT */
async function initChat() {

// 🔥 FIX: jangan return mentah, cek valid number
  if (!productId || productId === "0") return;

  try {

    const res = await fetch(`/api/products/${productId}`);
    const data = await res.json();

    if (!data.success) return;

    const product = data.product;

    targetUserId = product.sellerId;

    document.querySelector(".header").innerText =
      product.title;

    document.getElementById("productCard").innerHTML = `
      <div class="product-chat-card">
        <img
          src="${product.images?.[0] || '/public/images/banner1.jpg'}"
          class="product-chat-img"
        >

        <div class="product-chat-info">
          <div class="product-chat-title">
            ${product.title}
          </div>

          <div class="product-chat-price">
            Rp ${Number(product.price).toLocaleString("id-ID")}
          </div>
        </div>
      </div>
    `;

  } catch(err){
    console.log(err);
  }
}

/* LOAD CHAT */

async function loadChat(){

  const res = await fetch(
    `/api/chat/${targetUserId}?productId=${productId || ""}`,
    { credentials:"include" }
  );

  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  if(!data.success) return;

  data.messages.forEach(m => {

    const div = document.createElement("div");

    const isMe =
      Number(m.fromUserId) === Number(window.currentUserId);

    div.className = isMe ? "msg me" : "msg other";

    div.innerHTML = `<div class="bubble">${m.message}</div>`;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* SEND MESSAGE */
async function sendMsg() {

  const input =
    document.getElementById("message");

  const message =
    input.value.trim();

  if (!message) return;

  try {

    const res =
      await fetch("/api/chat/send", {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          toUserId:
            Number(targetUserId),
          productId:
            Number(productId) || null,
          message
        })
      });

    const data = await res.json();

console.log("SEND RESULT:", data);

if (!data.success) {
  alert(JSON.stringify(data));
  return;
}

    input.value = "";

    await loadChat();

  } catch(err) {

    console.log(err);
    alert("Server error");

  }

}

/* ENTER KEY */
document
.getElementById("message")
.addEventListener(
  "keypress",
  function(e){
    if(e.key === "Enter"){
      sendMsg();
    }
  }
);

/* START */
(async () => {

  await getMe();

  await initChat();

  await loadChat();

  setInterval(() => {
    loadChat();
  }, 3000);

})();
</script>

</body>
</html>
